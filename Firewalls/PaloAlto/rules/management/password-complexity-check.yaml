id: "0014"
name: "Complexidade mínima de senha não evidenciada"
category: "Management"
severity: "MEDIUM"

check:
  type: "required_line"
  match:
    mode: "all_terms_in_same_line"
    terms:
      - "deviceconfig"
      - "setting"
      - "password-complexity"

output:
  finding_title: "Política de senha (complexidade mínima) não evidenciada"
  show_full_line: false
  recommendation: >
    Habilitar e ajustar a política de complexidade mínima de senha (comprimento e classes
    de caracteres), alinhando com CIS e política interna.
  reference: "CIS Palo Alto Firewall 11 Benchmark v1.2.0 - 1.3.1 (Minimum Password Complexity)"